<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人社交名片生成器</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <!-- 现代二维码库 -->
    <script src="qrcode-modern.bundle.js"></script>
    <!-- 二维码库加载检测 -->
    <script>
        // 本地库加载检测
        function checkLocalQRCode() {
            if (typeof QRCode === 'undefined' || typeof QRCode.toDataURL !== 'function') {
                console.error('本地二维码库加载失败');
                window.qrCodeLoadFailed = true;
                return false;
            }
            console.log('本地二维码库加载成功');
            return true;
        }
        
        // 显示状态指示器的函数
        function showQRCodeStatus(type) {
            const statusElements = ['qrcode-loading-status', 'qrcode-load-success', 'qrcode-load-failed'];
            statusElements.forEach(id => {
                const element = document.getElementById(id);
                if (element) element.style.display = 'none';
            });
            
            const targetElement = document.getElementById('qrcode-' + type);
            if (targetElement) {
                targetElement.style.display = 'block';
                if (type === 'load-success') {
                    setTimeout(() => targetElement.style.display = 'none', 3000);
                }
            }
        }
        
        // 页面加载完成后检查QRCode库是否可用
        window.addEventListener('load', function() {
            // 显示加载状态
            showQRCodeStatus('loading-status');
            
            // 检查本地库是否加载成功
            setTimeout(function() {
                if (checkLocalQRCode()) {
                    showQRCodeStatus('load-success');
                } else {
                    showQRCodeStatus('load-failed');
                }
            }, 500);
        });
        
        // 监听脚本加载成功事件
        window.addEventListener('DOMContentLoaded', function() {
            // 如果二维码库已经可用，立即显示成功状态
            if (typeof QRCode !== 'undefined' && typeof QRCode.toDataURL === 'function') {
                console.log('二维码库在DOMContentLoaded时已可用');
                showQRCodeStatus('load-success');
            }
        });
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- 标题 -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">个人社交名片生成器</h1>
            <p class="text-gray-600">创建属于你的专业社交名片</p>
            <!-- 库加载状态指示器 -->
            <div id="qrcode-loading-status" class="mt-4 p-3 bg-yellow-100 border border-yellow-400 text-yellow-700 rounded-md" style="display: none;">
                <i class="fas fa-spinner fa-spin mr-2"></i>
                二维码库正在加载中，请稍候...
            </div>
            <div id="qrcode-load-success" class="mt-4 p-3 bg-green-100 border border-green-400 text-green-700 rounded-md" style="display: none;">
                <i class="fas fa-check-circle mr-2"></i>
                二维码功能已就绪！
            </div>
            <div id="qrcode-load-failed" class="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-md" style="display: none;">
                <i class="fas fa-exclamation-triangle mr-2"></i>
                二维码库加载失败，请检查网络连接后刷新页面
            </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-8">
            <!-- 左侧：信息输入表单 -->
            <div class="bg-white rounded-lg shadow-lg p-6" id="formArea">
                <h2 class="text-2xl font-semibold mb-6 text-gray-800">填写个人信息</h2>
                
                <!-- 基本信息 -->
                <div class="mb-6">
                    <h3 class="text-lg font-medium mb-4 text-gray-700 flex items-center">
                        <i class="fas fa-user mr-2 text-blue-500"></i>基本信息
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                            <input type="text" id="name" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入您的姓名">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
                            <input type="tel" id="phone" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入您的手机号">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                            <input type="email" id="email" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入您的邮箱">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">公司</label>
                            <input type="text" id="company" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入您的公司名称">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">地点</label>
                            <input type="text" id="location" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="如：北京市">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">身份标签</label>
                            <input type="text" id="title" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="如：产品经理 / 软件工程师">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">头像</label>
                            <input type="file" id="avatarFile" accept="image/*" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <input type="hidden" id="avatar">
                        </div>
                    </div>
                </div>

                <!-- 履历亮点 -->
                <div class="mb-6">
                    <h3 class="text-lg font-medium mb-4 text-gray-700 flex items-center">
                        <i class="fas fa-star mr-2 text-yellow-500"></i>履历亮点
                    </h3>
                    <textarea id="highlights" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入您的主要成就和亮点，每行一个"></textarea>
                </div>

                <!-- 擅长领域 -->
                <div class="mb-6">
                    <h3 class="text-lg font-medium mb-4 text-gray-700 flex items-center">
                        <i class="fas fa-cogs mr-2 text-green-500"></i>擅长领域
                    </h3>
                    <textarea id="skills" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入您的专业技能，每行一个"></textarea>
                </div>

                <!-- 兴趣爱好 -->
                <div class="mb-6">
                    <h3 class="text-lg font-medium mb-4 text-gray-700 flex items-center">
                        <i class="fas fa-heart mr-2 text-red-500"></i>兴趣爱好
                    </h3>
                    <textarea id="interests" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入您的兴趣爱好，每行一个"></textarea>
                </div>

                <!-- 个人态度 -->
                <div class="mb-6">
                    <h3 class="text-lg font-medium mb-4 text-gray-700 flex items-center">
                        <i class="fas fa-quote-left mr-2 text-purple-500"></i>个人态度
                    </h3>
                    <textarea id="motto" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入您的个人座右铭或态度"></textarea>
                </div>

                <!-- 联系方式二维码 -->
                <div class="mb-6">
                    <h3 class="text-lg font-medium mb-4 text-gray-700 flex items-center">
                        <i class="fas fa-qrcode mr-2 text-indigo-500"></i>联系方式二维码
                    </h3>
                    <input type="file" id="qrcodeFile" accept="image/*" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="上传您的联系方式二维码（如微信、QQ等）">
                </div>

                <!-- 生成按钮 -->
                <div class="space-y-3">
                    <button onclick="generateCard()" class="w-full bg-blue-600 text-white py-3 px-4 rounded-md hover:bg-blue-700 transition duration-200 font-medium">
                        <i class="fas fa-magic mr-2"></i>生成名片
                    </button>
                    <div id="length-indicator" style="margin-bottom: 10px; font-size: 12px; color: #666;">数据长度: 0 字符 (无限制)</div>
                    <button onclick="generateCardQRCode()" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md hover:bg-indigo-700 transition duration-200 font-medium">
                        <i class="fas fa-qrcode mr-2"></i>生成名片二维码
                    </button>
                </div>
            </div>

            <!-- 右侧：名片预览 -->
            <div class="bg-white rounded-lg shadow-lg p-6" id="previewArea">
                <h2 class="text-2xl font-semibold mb-6 text-gray-800">名片预览</h2>
                
                <!-- 名片容器 -->
                <div id="businessCard" class="bg-gradient-to-br from-blue-50 to-indigo-100 rounded-xl p-8 shadow-lg max-w-md mx-auto">
                    <!-- 头部信息 -->
                    <div class="text-center mb-6">
                        <div class="w-20 h-20 bg-gray-300 rounded-full mx-auto mb-4 flex items-center justify-center overflow-hidden">
                            <img id="cardAvatar" src="" alt="头像" class="w-full h-full object-cover hidden">
                            <i class="fas fa-user text-gray-500 text-2xl" id="defaultAvatar"></i>
                        </div>
                        <h3 id="cardName" class="text-2xl font-bold text-gray-800 mb-1">您的姓名</h3>
                        <p id="cardPhone" class="text-gray-600 mb-2 flex items-center justify-center">
                            <i class="fas fa-phone mr-1"></i>您的手机号
                        </p>
                        <p id="cardEmail" class="text-gray-600 mb-2 flex items-center justify-center">
                            <i class="fas fa-envelope mr-1"></i>您的邮箱
                        </p>
                        <p id="cardCompany" class="text-gray-600 mb-2 flex items-center justify-center">
                            <i class="fas fa-building mr-1"></i>您的公司
                        </p>
                        <p id="cardLocation" class="text-gray-600 mb-2 flex items-center justify-center">
                            <i class="fas fa-map-marker-alt mr-1"></i>您的地点
                        </p>
                        <span id="cardTitle" class="inline-block bg-blue-600 text-white px-3 py-1 rounded-full text-sm font-medium mt-1">您的身份标签</span>
                    </div>

                    <!-- 主体部分 -->
                    <div class="space-y-4 mb-6">
                        <!-- 履历亮点 -->
                        <div>
                            <h4 class="flex items-center text-gray-800 font-semibold mb-2">
                                <i class="fas fa-star text-yellow-500 mr-2"></i>履历亮点
                            </h4>
                            <ul id="cardHighlights" class="text-sm text-gray-700 space-y-1">
                                <li>• 请填写您的履历亮点</li>
                            </ul>
                        </div>

                        <!-- 擅长领域 -->
                        <div>
                            <h4 class="flex items-center text-gray-800 font-semibold mb-2">
                                <i class="fas fa-cogs text-green-500 mr-2"></i>擅长领域
                            </h4>
                            <ul id="cardSkills" class="text-sm text-gray-700 space-y-1">
                                <li>• 请填写您的专业技能</li>
                            </ul>
                        </div>

                        <!-- 兴趣爱好 -->
                        <div>
                            <h4 class="flex items-center text-gray-800 font-semibold mb-2">
                                <i class="fas fa-heart text-red-500 mr-2"></i>兴趣爱好
                            </h4>
                            <ul id="cardInterests" class="text-sm text-gray-700 space-y-1">
                                <li>• 请填写您的兴趣爱好</li>
                            </ul>
                        </div>
                    </div>

                    <!-- 页脚部分 -->
                    <div class="border-t border-gray-200 pt-4">
                        <div class="flex items-center justify-between">
                            <div class="flex-1">
                                <p id="cardMotto" class="text-sm text-gray-600 italic">"您的个人态度"</p>
                            </div>
                            <div class="w-12 h-12 bg-gray-200 rounded border-2 border-dashed border-gray-400 flex items-center justify-center ml-4 overflow-hidden" id="qrcodeContainer">
                                <img id="cardQRCode" src="" alt="二维码" class="w-full h-full object-cover hidden">
                                <i class="fas fa-qrcode text-gray-500" id="defaultQRCode"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 名片二维码预览 -->
                <div class="mt-6 bg-gray-50 rounded-lg p-4 border border-gray-200">
                    <h3 class="text-lg font-medium mb-3 text-gray-700 text-center">名片二维码预览</h3>
                    <div class="flex flex-col items-center">
                        <div id="cardContentQRContainer" class="w-32 h-32 bg-white rounded-lg border-2 border-dashed border-gray-300 flex items-center justify-center mb-3">
                            <img id="cardContentQRCode" src="" alt="名片内容二维码" class="w-full h-full object-contain rounded-lg hidden">
                            <div id="defaultCardQRCode" class="text-center text-gray-400">
                                <i class="fas fa-qrcode text-3xl mb-2"></i>
                                <p class="text-xs">点击生成名片二维码</p>
                            </div>
                        </div>
                        <p class="text-xs text-gray-500 text-center">扫描二维码查看完整名片信息</p>
                    </div>
                </div>

                <!-- 功能按钮 -->
                <div class="mt-6 space-y-3">
                    <button onclick="downloadCardAsPNG()" class="w-full bg-green-600 text-white py-2 px-6 rounded-md hover:bg-green-700 transition duration-200 font-medium">
                        <i class="fas fa-download mr-2"></i>下载PNG名片
                    </button>
                    <button onclick="downloadCardQRCode()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg transition duration-300 flex items-center justify-center">
                        <i class="fas fa-download mr-2"></i>下载名片二维码
                    </button>
                    <button onclick="shareCard()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg transition duration-300 flex items-center justify-center">
                        <i class="fas fa-download mr-2"></i>下载HTML名片
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
